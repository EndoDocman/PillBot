<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillBot Tablet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --blue: #2563eb; --red: #dc2626; --green: #10b981; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 800px; margin-bottom: 20px; }
        h1 { font-size: 3rem; color: var(--blue); }
        button { width: 100%; padding: 30px; font-size: 2.5rem; border: none; border-radius: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .save { background: var(--blue); color: white; }
        
        /* GERIATRIC "ONE-CLICK" INSTALLER */
        #install-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2563eb; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .big-btn { background: #10b981; color: white; width: 85%; height: 200px; font-size: 4rem; border-radius: 40px; border: 10px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        #main { display: block; }
        #qr-view { display: none; text-align: center; }
        input { width: 100%; font-size: 2.5rem; padding: 15px; margin: 15px 0 30px 0; border: 4px solid #ddd; border-radius: 15px; }
    </style>
</head>
<body>
    <!-- One-Click Installation Overlay -->
    <div id="install-overlay">
        <h1 style="font-size: 5rem; margin-bottom: 50px;">💊 PILLBOT</h1>
        <button id="btn-install" class="big-btn">📥 INSTALL NOW</button>
        <p style="font-size: 2rem; margin-top: 40px;">Tap the button to put PillBot on your Tablet</p>
    </div>

    <div id="main">
        <h1>💊 PillBot Personal</h1>
        <div class="card">
            <label style="font-size:2rem">Tablet Name</label>
            <input type="text" id="name" placeholder="Levothyroxine">
            <label style="font-size:2rem">Stock Count</label>
            <input type="number" id="stock" placeholder="30">
            <button class="save" onclick="save()">SAVE & SECURE</button>
        </div>
        <div id="stats" style="font-size: 2.5rem; text-align: center;"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        let deferredPrompt;
        const overlay = document.getElementById('install-overlay');
        const btnInstall = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            overlay.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') overlay.style.display = 'none';
                deferredPrompt = null;
            }
        });

        async function save() {
            const data = { 
                name: document.getElementById('name').value, 
                stock: parseInt(document.getElementById('stock').value),
                hash: "GENESIS", ts: new Date().toISOString()
            };
            const request = indexedDB.open('PillBotDB', 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore('meds');
            request.onsuccess = e => {
                e.target.result.transaction('meds','readwrite').objectStore('meds').put(data, 'current_med');
                alert("Medication Secured ✅");
            };
        }
    </script>
</body>
</html>
