<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>PillBot | Personal Tablet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --blue: #2563eb;
            --green: #10b981;
            --red: #dc2626;
            --bg: #f1f5f9;
            --text: #334155;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 10px 0;
        }

        h1 { font-size: 2.2rem; color: var(--blue); margin: 0; font-weight: 800; }

        .btn-install-header {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: none; /* Shows via JS */
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }

        .form-section { margin-bottom: 30px; }
        
        label {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #64748b;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            font-size: 1.5rem;
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            box-sizing: border-box;
            background: #f8fafc;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--blue); outline: none; }

        /* DOSE SCHEDULING */
        .dose-grid { display: grid; gap: 15px; margin-top: 15px; }

        .dose-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-radius: 18px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            transition: all 0.2s;
        }

        .dose-card.active { border-color: var(--blue); background: #eff6ff; }

        .dose-info { display: flex; align-items: center; gap: 15px; font-size: 1.4rem; font-weight: 700; }

        input[type="checkbox"] { width: 35px; height: 35px; accent-color: var(--blue); }

        input[type="time"] {
            font-size: 1.5rem;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            display: none; /* Managed by JS */
        }

        /* ACTIONS */
        .btn-main {
            width: 100%;
            padding: 22px;
            font-size: 1.6rem;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .btn-blue { background: var(--blue); color: white; }
        .btn-emerald { background: var(--green); color: white; }
        .btn-back { background: #64748b; color: white; margin-top: 30px; }

        /* STOCK STATUS */
        .status-badge {
            text-align: center;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.5rem;
            font-weight: 800;
            background: #e2e8f0;
        }

        .status-low { background: #fee2e2; color: var(--red); border: 2px solid var(--red); }

        #main-view { display: block; }
        #qr-view { display: none; text-align: center; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-view">
        <header>
            <h1>💊 PillBot</h1>
            <button id="install-btn" class="btn-install-header" onclick="triggerInstall()">📲 Install App</button>
        </header>

        <div class="card">
            <div class="form-section">
                <label>Medicine Name</label>
                <input type="text" id="name" placeholder="e.g. Levothyroxine">
            </div>

            <div class="form-section">
                <label>Current Stock (Pills)</label>
                <input type="number" id="stock" placeholder="30">
            </div>

            <label>Schedule</label>
            <div class="dose-grid">
                <!-- Morning -->
                <div class="dose-card" id="card-m">
                    <div class="dose-info">
                        <input type="checkbox" id="m" onchange="handleToggle('m', 'tm')">
                        <span>☀️ Morning</span>
                    </div>
                    <input type="time" id="tm" value="08:00">
                </div>

                <!-- Afternoon -->
                <div class="dose-card" id="card-a">
                    <div class="dose-info">
                        <input type="checkbox" id="a" onchange="handleToggle('a', 'ta')">
                        <span>🌤️ Afternoon</span>
                    </div>
                    <input type="time" id="ta" value="13:00">
                </div>

                <!-- Night -->
                <div class="dose-card" id="card-n">
                    <div class="dose-info">
                        <input type="checkbox" id="n" onchange="handleToggle('n', 'tn')">
                        <span>🌙 Night</span>
                    </div>
                    <input type="time" id="tn" value="21:00">
                </div>
            </div>

            <button class="btn-main btn-blue" onclick="saveData()">✅ SAVE RECORDS</button>
            <button class="btn-main btn-emerald" onclick="showEmergencyQR()">🆔 MEDICAL ID</button>
        </div>

        <div id="stats-area"></div>
    </div>

    <!-- Emergency ID View -->
    <div class="container" id="qr-view">
        <div class="card">
            <h1 style="color: var(--red); margin-bottom: 25px;">🚨 EMERGENCY ID</h1>
            <div id="qr-summary" style="font-size: 1.6rem; text-align: left; margin-bottom: 30px; border-left: 8px solid var(--red); padding-left: 20px;"></div>
            <div id="qrcode" style="padding: 15px; background: white; display: inline-block; border-radius: 20px; border: 1px solid #ddd;"></div>
            <button class="btn-main btn-back" onclick="location.reload()">⬅️ BACK TO DASHBOARD</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        // Logic for toggling time and visual state
        function handleToggle(checkId, timeId) {
            const isChecked = document.getElementById(checkId).checked;
            document.getElementById(timeId).style.display = isChecked ? 'block' : 'none';
            document.getElementById('card-' + checkId).classList.toggle('active', isChecked);
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        async function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
                deferredPrompt = null;
            } else {
                alert("To install on iPad: Tap the 'Share' icon and select 'Add to Home Screen'.");
            }
        }

        // Database logic
        const openDB = () => new Promise(res => {
            const req = indexedDB.open('PillBotDB', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('meds');
            req.onsuccess = e => res(e.target.result);
        });

        async function saveData() {
            const data = {
                name: document.getElementById('name').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                m: document.getElementById('m').checked, a: document.getElementById('a').checked, n: document.getElementById('n').checked,
                tm: document.getElementById('tm').value, ta: document.getElementById('ta').value, tn: document.getElementById('tn').value,
                ts: new Date().toISOString(), hash: "BLOCK_" + Date.now()
            };
            const db = await openDB();
            await db.transaction('meds','readwrite').objectStore('meds').put(data, 'current_med');
            alert("Prescription Secured ✅");
            renderStats();
        }

        async function renderStats() {
            const db = await openDB();
            const data = await new Promise(r => {
                const req = db.transaction('meds').objectStore('meds').get('current_med');
                req.onsuccess = () => r(req.result);
            });
            if (!data) return;
            const daily = (data.m?1:0) + (data.a?1:0) + (data.n?1:0);
            const days = daily > 0 ? Math.floor(data.stock / daily) : 0;
            document.getElementById('stats-area').innerHTML = `
                <div class="status-badge ${days < 5 ? 'status-low' : ''}">
                    BOX STATUS: ${data.stock} Pills (${days} Days Left)
                </div>`;
        }

        async function showEmergencyQR() {
            const db = await openDB();
            const data = await new Promise(r => {
                const req = db.transaction('meds').objectStore('meds').get('current_med');
                req.onsuccess = () => r(req.result);
            });
            if (!data) { alert("Enter meds first!"); return; }
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('qr-view').style.display = 'block';
            document.getElementById('qr-summary').innerHTML = `<b>MEDICINE:</b> ${data.name}<br><b>TIMES:</b> ${data.m?data.tm:''} ${data.a?data.ta:''} ${data.n?data.tn:''}`;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: JSON.stringify(data), width: 300, height: 300 });
        }
        window.onload = renderStats;
    </script>
</body>
</html>
