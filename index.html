<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PillBot Tablet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --blue: #2563eb;
            --dark-blue: #1e40af;
            --green: #10b981;
            --red: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--blue);
            margin: 0;
        }

        .card {
            background: var(--card);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #475569;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            font-size: 2.5rem;
            padding: 20px;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            box-sizing: border-box;
            background-color: #f1f5f9;
        }

        /* DOSE GRID */
        .dose-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .dose-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px;
            border-radius: 25px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
        }

        .dose-label {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 2.2rem;
            font-weight: 600;
        }

        input[type="checkbox"] {
            width: 50px;
            height: 50px;
            cursor: pointer;
        }

        input[type="time"] {
            font-size: 2.5rem;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid var(--blue);
            display: none; /* Hidden by default */
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 30px;
            font-size: 2.5rem;
            font-weight: 800;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-outline { background: transparent; border: 3px solid #cbd5e1; color: #64748b; margin-top: 40px; }

        /* OVERLAYS */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--blue);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        .install-card {
            background: white;
            color: #1e293b;
            padding: 50px;
            border-radius: 40px;
            width: 90%;
            max-width: 600px;
        }

        /* STATUS */
        .inventory-box {
            text-align: center;
            padding: 30px;
            border-radius: 25px;
            font-size: 2.5rem;
            font-weight: bold;
            background: #f1f5f9;
            margin-top: 20px;
        }
        .low-stock {
            background: #fee2e2;
            color: var(--red);
            border: 5px solid var(--red);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }

        #qr-view { display: none; text-align: center; }
    </style>
</head>
<body>

    <!-- Geriatric Installer Overlay -->
    <div id="install-overlay" class="overlay">
        <div class="install-card">
            <h1 style="font-size: 4rem; margin-bottom: 20px;">Welcome to PillBot</h1>
            <p style="font-size: 2rem; margin-bottom: 40px;">To use this on your Tablet, tap the Install button below.</p>
            <button id="btn-install-trigger" class="btn btn-green">📥 INSTALL NOW</button>
            <button onclick="document.getElementById('install-overlay').style.display='none'" class="btn btn-outline">Close</button>
        </div>
    </div>

    <div id="main-view" class="container">
        <header>
            <h1>💊 PillBot</h1>
        </header>

        <div class="card">
            <div class="form-group">
                <label>Medicine Name</label>
                <input type="text" id="name" placeholder="e.g. Levothyroxine">
            </div>

            <div class="form-group">
                <label>Total Pills in Box</label>
                <input type="number" id="stock" placeholder="30">
            </div>

            <label>When do you take it?</label>
            <div class="dose-section">
                <!-- Morning -->
                <div class="dose-row" style="border-left: 15px solid #fbbf24;">
                    <div class="dose-label">
                        <input type="checkbox" id="m" onchange="toggleClock('tm', this.checked)">
                        <span>☀️ Morning</span>
                    </div>
                    <input type="time" id="tm" value="08:00">
                </div>

                <!-- Afternoon -->
                <div class="dose-row" style="border-left: 15px solid #f97316;">
                    <div class="dose-label">
                        <input type="checkbox" id="a" onchange="toggleClock('ta', this.checked)">
                        <span>🌤️ Afternoon</span>
                    </div>
                    <input type="time" id="ta" value="13:00">
                </div>

                <!-- Night -->
                <div class="dose-row" style="border-left: 15px solid #1e1b4b;">
                    <div class="dose-label">
                        <input type="checkbox" id="n" onchange="toggleClock('tn', this.checked)">
                        <span>🌙 Night</span>
                    </div>
                    <input type="time" id="tn" value="21:00">
                </div>
            </div>

            <button class="btn btn-blue" onclick="saveData()">✅ SAVE PRESCRIPTION</button>
            <button class="btn btn-green" onclick="showQR()">🆔 EMERGENCY ID CARD</button>
        </div>

        <div id="stats-area"></div>
    </div>

    <!-- Emergency ID View -->
    <div id="qr-view" class="container">
        <div class="card">
            <h1 style="color: var(--red); margin-bottom: 20px;">🚨 EMERGENCY ID</h1>
            <div id="qr-summary" style="font-size: 2.5rem; text-align: left; margin-bottom: 30px;"></div>
            <div id="qrcode" style="padding: 20px; background: white; display: inline-block; border-radius: 20px;"></div>
            <button class="btn btn-blue" onclick="location.reload()">⬅️ BACK</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        // Logic to show/hide the clock (time picker)
        function toggleClock(id, show) {
            document.getElementById(id).style.display = show ? 'block' : 'none';
        }

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-overlay').style.display = 'flex';
        });

        document.getElementById('btn-install-trigger').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-overlay').style.display = 'none';
                deferredPrompt = null;
            } else {
                alert("On iPad: Tap the 'Share' icon (square with arrow) and select 'Add to Home Screen'.");
            }
        });

        // Data Storage (IndexedDB for Blockchain Support)
        const openDB = () => new Promise(res => {
            const req = indexedDB.open('PillBotDB', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('meds');
            req.onsuccess = e => res(e.target.result);
        });

        async function saveData() {
            const data = {
                name: document.getElementById('name').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                m: document.getElementById('m').checked,
                a: document.getElementById('a').checked,
                n: document.getElementById('n').checked,
                tm: document.getElementById('tm').value,
                ta: document.getElementById('ta').value,
                tn: document.getElementById('tn').value,
                ts: new Date().toISOString(),
                hash: "GENESIS"
            };

            const db = await openDB();
            const tx = db.transaction('meds', 'readwrite');
            await tx.objectStore('meds').put(data, 'current_med');
            alert("Prescription Secured ✅");
            renderStats();
        }

        async function renderStats() {
            const db = await openDB();
            const data = await new Promise(r => {
                const req = db.transaction('meds').objectStore('meds').get('current_med');
                req.onsuccess = () => r(req.result);
            });
            if (!data) return;

            const dailyCount = (data.m?1:0) + (data.a?1:0) + (data.n?1:0);
            const daysLeft = dailyCount > 0 ? Math.floor(data.stock / dailyCount) : 0;
            
            const area = document.getElementById('stats-area');
            area.innerHTML = `
                <div class="inventory-box ${daysLeft < 5 ? 'low-stock' : ''}">
                    BOX STATUS: ${data.stock} Pills Left<br>
                    (${daysLeft} Days Remaining)
                </div>
            `;
        }

        async function showQR() {
            const db = await openDB();
            const data = await new Promise(r => {
                const req = db.transaction('meds').objectStore('meds').get('current_med');
                req.onsuccess = () => r(req.result);
            });
            if (!data) { alert("Enter meds first!"); return; }

            document.getElementById('main-view').style.display = 'none';
            document.getElementById('qr-view').style.display = 'block';
            
            document.getElementById('qr-summary').innerHTML = `
                <b>MED:</b> ${data.name}<br>
                <b>DOSE:</b> ${data.m ? 'Morning ' : ''}${data.a ? 'Afternoon ' : ''}${data.n ? 'Night' : ''}
            `;

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: JSON.stringify({name: data.name, sched: [data.m?data.tm:null, data.a?data.ta:null, data.n?data.tn:null]}),
                width: 350, height: 350
            });
        }

        window.onload = renderStats;
    </script>
</body>
</html>
